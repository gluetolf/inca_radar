# =============================================================================
# inca.yml  –  GitHub-Actions-Workflow fuer das Niederschlagsradar
#
# Ablauf: cron-job.org stoesst diesen Workflow ueber die GitHub-API an
# (workflow_dispatch). GitHub baut mit build.py den Ordner ./site/ und laedt ihn
# per FTP auf METAhost. Ablageort im Repo: .github/workflows/inca.yml
# Kein "schedule"-Block: der Takt kommt von cron-job.org.
# =============================================================================

name: INCA Radar aktualisieren

on:
  workflow_dispatch:

concurrency:
  group: inca-build
  cancel-in-progress: false           # laufender Build wird nicht abgebrochen (keine FTP-Kollision)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Code holen
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Radardaten holen und Karten bauen
        env:
          METEOFRANCE_TOKEN: ${{ secrets.METEOFRANCE_TOKEN }}
        run: python build.py

      # ./site/ per FTP hochladen - robust gegen die zeitweisen METAhost-Timeouts:
      #  * EINE Verbindung, sequentiell (parallel=1) -> schonend fuer den Host
      #  * Keepalive/Reconnect -> haelt die Kontrollverbindung offen
      #  * der GANZE Upload wird bei Fehler bis zu 4x mit 30s Pause wiederholt
      #  * mirror --ignore-time laedt nur geaenderte Dateien; frames.json wird IMMER
      #    frisch nachgeschoben (gleiche Groesse, aber neuer Inhalt pro Build)
      - name: Per FTP auf METAhost laden
        env:
          FTP_SERVER:     ${{ secrets.FTP_SERVER }}
          FTP_USERNAME:   ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD:   ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp >/dev/null
          CMDS="set cmd:fail-exit true; \
                set net:timeout 30; set net:max-retries 2; set net:persist-retries 3; \
                set net:reconnect-interval-base 5; set net:reconnect-interval-multiplier 1; \
                set ftp:passive-mode true; set ftp:ssl-force true; set ftp:ssl-protect-data true; \
                set ssl:verify-certificate no; set mirror:parallel-transfer-count 1; \
                cd \"$FTP_SERVER_DIR\"; \
                echo '--- Zielverzeichnis:'; pwd; \
                echo '--- Uebertrage geaenderte Dateien:'; \
                mirror -R -v --ignore-time --delete ./site/ .; \
                echo '--- frames.json erzwingen:'; put -v ./site/frames.json; \
                echo '--- Kontrolle frames.json auf dem Server:'; cls -l frames.json; \
                bye"
          n=1
          until lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -e "$CMDS" "$FTP_SERVER"; do
            if [ "$n" -ge 4 ]; then
              echo "::error::FTP nach $n Versuchen fehlgeschlagen (METAhost-Timeout)"; exit 1
            fi
            echo "FTP-Versuch $n fehlgeschlagen - warte 30 s und versuche erneut..."
            sleep 30; n=$((n+1))
          done
          echo "FTP-Upload erfolgreich (Versuch $n)"
