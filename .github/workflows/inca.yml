# =============================================================================
# inca.yml  –  GitHub-Actions-Workflow fuer das Niederschlagsradar
#
# Ablauf: cron-job.org stoesst diesen Workflow ueber die GitHub-API an
# (workflow_dispatch). GitHub baut mit build.py den Ordner ./site/ und laedt ihn
# per FTP (lftp, parallel) auf METAhost. Ablageort: .github/workflows/inca.yml
# Kein "schedule"-Block: der Takt kommt von cron-job.org.
# =============================================================================

name: INCA Radar aktualisieren

on:
  workflow_dispatch:

concurrency:
  group: inca-build
  cancel-in-progress: false           # laufender Build wird nicht abgebrochen (keine FTP-Kollision)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Code holen
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Radardaten holen und Karten bauen
        env:
          METEOFRANCE_TOKEN: ${{ secrets.METEOFRANCE_TOKEN }}
        run: python build.py

      # ./site/ per FTP hochladen - parallel mit lftp, robust gegen kurze Server-Aussetzer:
      # wenige parallele Verbindungen, geduldige Wiederverbindung, und bis zu 3 Gesamtversuche.
      - name: Per FTP auf METAhost laden (parallel, lftp)
        env:
          FTP_SERVER:     ${{ secrets.FTP_SERVER }}
          FTP_USERNAME:   ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD:   ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          cat > deploy.lftp <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate no
          set ftp:passive-mode true
          set net:connection-limit 3
          set net:max-retries 5
          set net:persist-retries 5
          set net:reconnect-interval-base 5
          set net:reconnect-interval-multiplier 1
          set net:timeout 30
          set mirror:parallel-transfer-count 3
          open -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER"
          mirror -R --parallel=3 --delete --no-perms --ignore-time --verbose ./site/ "$FTP_SERVER_DIR"
          put -O "$FTP_SERVER_DIR" ./site/frames.json
          put -O "$FTP_SERVER_DIR" ./site/index.html
          bye
          EOF
          ok=0
          for attempt in 1 2 3; do
          if lftp -f deploy.lftp; then echo "FTP-Upload ok (Versuch $attempt)"; ok=1; break; fi
          echo "FTP-Versuch $attempt fehlgeschlagen - neuer Versuch in 20s..."
          sleep 20
          done
          rm -f deploy.lftp
          if [ "$ok" != "1" ]; then echo "FTP-Upload nach 3 Versuchen fehlgeschlagen"; exit 1; fi
          # Bei "421 too many connections": die beiden 3er-Werte weiter senken (z.B. 2).
          # Bei hartnaeckigen TLS-Problemen "set ftp:ssl-force true" -> "false".
