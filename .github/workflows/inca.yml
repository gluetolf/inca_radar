# =============================================================================
# inca.yml  –  GitHub-Actions-Workflow fuer das Niederschlagsradar
#
# Ablauf: cron-job.org stoesst diesen Workflow ueber die GitHub-API an
# (workflow_dispatch). GitHub baut mit build.py den Ordner ./site/ und laedt ihn
# per FTP auf METAhost. Ablageort im Repo: .github/workflows/inca.yml
# Kein "schedule"-Block: der Takt kommt von cron-job.org.
# =============================================================================

name: INCA Radar aktualisieren

on:
  workflow_dispatch:

concurrency:
  group: inca-build
  cancel-in-progress: false           # laufender Build wird nicht abgebrochen (keine FTP-Kollision)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Code holen
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Radardaten holen und Karten bauen
        env:
          METEOFRANCE_TOKEN: ${{ secrets.METEOFRANCE_TOKEN }}
        run: python build.py

      # ./site/ per FTP hochladen - STANDARD-Weg: eine Verbindung, Dateien nacheinander.
      # Die Action vergleicht Datei-Hashes und laedt nur GEAENDERTE Dateien hoch; dank der
      # Zeitstempel-Namen bleiben die meisten Radar-/Vorhersagebilder unveraendert.
      - name: Per FTP auf METAhost laden
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir:  ./site/
          protocol:   ftps
          timeout:    60000
          log-level:  minimal
