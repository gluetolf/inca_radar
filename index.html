<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Niederschlagsradar Schweiz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{--green:#76b82a;--green-dark:#5e9521;--ink:#1d2417;--panel:rgba(255,255,255,.92);
    --panel-line:rgba(0,0,0,.08);--muted:#6b7464;--shadow:0 2px 14px rgba(0,0,0,.14);--radius:14px;
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{overflow:hidden;background:#dfe5d8;color:var(--ink)}
  #map{position:absolute;inset:0;background:#dfe5d8;z-index:0}
  .city-label{background:none;border:none;box-shadow:none;font-weight:600;font-size:12px;color:#2c3422;
    text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 6px #fff;white-space:nowrap;pointer-events:auto;cursor:pointer}
  .lake-label{background:none;border:none;box-shadow:none;font-style:italic;font-weight:500;font-size:12px;
    color:#1b5a8c;letter-spacing:.5px;transform:translate(-50%,-50%);
    text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 6px #fff;white-space:nowrap;pointer-events:auto;cursor:pointer}
  .city-dot{width:5px;height:5px;border-radius:50%;background:#2c3422;box-shadow:0 0 0 2px #fff;margin:0 auto 2px}
  .city-home .city-dot{background:var(--green);box-shadow:0 0 0 2px #fff,0 0 8px var(--green)}
  .city-home{color:var(--green-dark)}
  .topbar{position:absolute;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;gap:12px;padding:12px 16px;pointer-events:none}
  .brand{pointer-events:auto;background:var(--panel);backdrop-filter:blur(8px);border:1px solid var(--panel-line);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:9px 14px;display:flex;align-items:center;gap:11px}
  .brand .mark{width:10px;height:26px;border-radius:3px;background:var(--green);flex:none}
  .brand h1{font-size:15px;margin:0;line-height:1.15;font-weight:700;letter-spacing:.2px}
  .brand .sub{font-size:11px;color:var(--muted);margin-top:1px}
  .status{pointer-events:auto;margin-left:auto;background:var(--panel);backdrop-filter:blur(8px);border:1px solid var(--panel-line);
    border-radius:999px;box-shadow:var(--shadow);padding:7px 13px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .status .live{width:8px;height:8px;border-radius:50%;background:var(--green)}
  .map-tools{position:absolute;top:62px;right:16px;z-index:500;display:flex;flex-direction:column;gap:8px}
  .map-tools button{width:40px;height:40px;border-radius:11px;border:1px solid var(--panel-line);background:var(--panel);
    backdrop-filter:blur(8px);box-shadow:var(--shadow);cursor:pointer;font-size:16px;color:var(--ink);display:grid;place-items:center}
  .map-tools button:active{transform:scale(.94)}.map-tools button.on{background:var(--green);color:#fff;border-color:var(--green)}
  .dock{position:absolute;left:0;right:0;bottom:0;z-index:500;padding:0 14px 14px;display:flex;justify-content:center}
  .panel{width:100%;max-width:780px;background:var(--panel);backdrop-filter:blur(10px);border:1px solid var(--panel-line);
    border-radius:18px;box-shadow:var(--shadow);padding:12px 16px 14px}
  .row{display:flex;align-items:center;gap:14px}
  .play{width:46px;height:46px;flex:none;border-radius:50%;border:none;cursor:pointer;background:var(--green);color:#fff;
    font-size:18px;display:grid;place-items:center;box-shadow:0 3px 10px rgba(118,184,42,.45)}
  .play:hover{background:var(--green-dark)}.play:active{transform:scale(.95)}
  .timewrap{flex:1;min-width:0}
  .timehead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
  .bigtime{font-size:20px;font-weight:700;letter-spacing:.3px}
  .tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:3px 9px;border-radius:999px}
  .tag.now{background:rgba(118,184,42,.16);color:var(--green-dark)}
  .tag.past{background:rgba(0,0,0,.06);color:var(--muted)}
  .tag.fc{background:rgba(243,162,58,.18);color:#b06b13}
  .track{position:relative;height:30px}
  .ticks{position:absolute;inset:0;display:flex;align-items:center;pointer-events:none}
  .tick{flex:1;height:6px;margin:0 1px;border-radius:3px;background:#cfd6c6;transition:background .2s,height .2s}
  .tick.past{background:#aab59b}.tick.fc{background:#f0c98a}.tick.active{background:var(--green);height:14px}
  .nowline{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--green-dark);border-radius:2px;opacity:.6}
  .dayline{position:absolute;top:-2px;bottom:-2px;width:1px;background:rgba(0,0,0,.16);pointer-events:none}
  .daylabel{position:absolute;top:-2px;transform:translateX(3px);font-size:9px;font-weight:700;color:var(--muted);line-height:1;pointer-events:none;white-space:nowrap}
  input[type=range]{position:absolute;inset:0;width:100%;height:100%;margin:0;opacity:0;cursor:pointer}
  .scalewrap{margin-top:12px}
  .scalehead{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
  .scalebar{height:11px;border-radius:6px;background:linear-gradient(90deg,#2d6ee1,#28b4aa,#5fc850,#e6d746,#f09637,#e13732,#aa196e)}
  .scalelabels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px}
  .speed{display:flex;gap:4px;align-items:center}
  .speed button{font-size:11px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 7px;border-radius:7px}
  .speed button.on{background:var(--green);color:#fff}
  .pointchip{position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:500;display:none;
    flex-direction:column;align-items:center;gap:2px;min-width:200px;
    background:var(--panel);backdrop-filter:blur(8px);border:1px solid var(--panel-line);border-radius:14px;box-shadow:var(--shadow);
    padding:7px 16px;font-size:13px;color:var(--ink);white-space:nowrap;max-width:92vw}
  .pointchip .pc-top{display:flex;align-items:center;gap:8px;justify-content:center}
  .pointchip .pc-loc{color:var(--muted)}
  .pointchip .pc-val{font-weight:700}
  .pointchip .pc-sw{width:12px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,.15);flex:none}
  .pointchip .pc-coord{font-size:11px;color:var(--muted);letter-spacing:.2px;font-variant-numeric:tabular-nums}
  .searchbox{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:600;display:none;width:min(340px,92vw)}
  .searchbox input{width:100%;box-sizing:border-box;padding:10px 14px;border-radius:12px;border:1px solid var(--panel-line);
    background:var(--panel);backdrop-filter:blur(8px);box-shadow:var(--shadow);color:var(--ink);font-size:14px;outline:none}
  .search-results{margin-top:6px;background:var(--panel);backdrop-filter:blur(8px);border:1px solid var(--panel-line);
    border-radius:12px;box-shadow:var(--shadow);overflow:hidden;max-height:52vh;overflow-y:auto}
  .search-results:empty{display:none}
  .sr-item{padding:9px 14px;cursor:pointer;font-size:14px;display:flex;align-items:baseline;gap:8px;border-bottom:1px solid var(--panel-line)}
  .sr-item:last-child{border-bottom:none}
  .sr-item:hover{background:rgba(127,127,127,.14)}
  .sr-name{color:var(--ink)}
  .sr-gem{color:var(--muted);font-size:12px;margin-left:auto}
  .sr-world{color:var(--muted);font-size:13px}
  .sr-info{padding:9px 14px;color:var(--muted);font-size:13px}
  .drybadge{position:absolute;top:54%;left:50%;transform:translate(-50%,-50%);z-index:450;display:none;pointer-events:none;
    background:rgba(255,255,255,.82);backdrop-filter:blur(6px);border:1px solid var(--panel-line);border-radius:12px;
    box-shadow:var(--shadow);padding:7px 15px;font-size:13px;font-weight:600;color:var(--muted)}
  .sel-marker div{width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid var(--green-dark);box-shadow:0 0 0 2px #fff,0 2px 6px rgba(0,0,0,.3)}
  .loc-marker div{width:16px;height:16px;border-radius:50%;background:#1a73e8;border:3px solid #fff;box-shadow:0 0 0 2px rgba(26,115,232,.45),0 2px 6px rgba(0,0,0,.35)}
  .crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:450;pointer-events:none;
    width:24px;height:24px;border-radius:50%;border:2px solid var(--green-dark);background:rgba(255,255,255,.12);
    box-shadow:0 0 0 2px rgba(255,255,255,.9),0 1px 5px rgba(0,0,0,.35)}
  .crosshair::before,.crosshair::after{content:"";position:absolute;top:50%;left:50%;background:var(--green-dark)}
  .crosshair::before{width:2px;height:9px;transform:translate(-50%,-50%)}
  .crosshair::after{width:9px;height:2px;transform:translate(-50%,-50%)}
  .leaflet-image-layer{transition:opacity .18s linear}
  .toast{position:absolute;top:58px;left:50%;transform:translateX(-50%);z-index:700;max-width:min(92vw,430px);
    background:var(--panel);backdrop-filter:blur(8px);border:1px solid var(--panel-line);border-radius:12px;
    box-shadow:var(--shadow);padding:11px 14px;font-size:13px;color:var(--ink);line-height:1.45;display:none}
  .toast b{font-weight:700}
  .toast .tx{cursor:pointer;color:var(--muted);font-weight:700;float:right;margin-left:12px;font-size:14px}
  .loading{position:absolute;inset:0;z-index:600;display:grid;place-items:center;background:#dfe5d8;color:var(--muted);font-size:14px}
  .errbox{max-width:380px;text-align:center;line-height:1.5}
  .spinner{width:34px;height:34px;border:3px solid #c3ccb6;border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (max-width:560px){.brand h1{font-size:13px}.brand .sub{display:none}.bigtime{font-size:17px}.map-tools{top:58px}
    .row{flex-wrap:wrap}
    .speed{flex-basis:100%;justify-content:center;margin-top:6px}
    .speed button{padding:6px 12px;font-size:12px}}
</style>
</head>
<body>
<div id="map"></div>
<div class="crosshair" id="crosshair"></div>
<div class="topbar">
  <div class="brand"><span class="mark"></span>
    <div><h1>Niederschlagsradar</h1><div class="sub">Radar &amp; Prognose · MeteoSchweiz, DWD, Météo-France</div></div>
  </div>
  <div class="status"><span class="live"></span><span id="updated">lädt…</span></div>
</div>
<div class="map-tools">
  <button id="searchBtn" title="Ort suchen">🔍</button>
  <button id="refreshBtn" title="Neu laden (neueste Version)">⟳</button>
  <button id="darkBtn" title="Hell/Dunkel">◐</button>
  <button id="homeBtn" title="Auf meinen Standort zentrieren">⌖</button>
</div>
<div class="searchbox" id="searchbox">
  <input id="searchInput" type="text" placeholder="Ort suchen…" autocomplete="off" spellcheck="false">
  <div class="search-results" id="searchResults"></div>
</div>
<div class="pointchip" id="pointchip">
  <div class="pc-top"><span class="pc-sw" id="pcsw"></span><span class="pc-loc" id="pcloc"></span><span class="pc-val" id="pcval"></span></div>
  <div class="pc-coord" id="pccoord"></div>
</div>
<div class="drybadge" id="drybadge">kein Niederschlag erwartet</div>
<div class="toast" id="toast"></div>
<div class="dock"><div class="panel">
  <div class="row">
    <button class="play" id="play" aria-label="Abspielen">▶</button>
    <div class="timewrap">
      <div class="timehead"><span class="bigtime" id="bigtime">--:--</span><span class="tag now" id="tag">Jetzt</span></div>
      <div class="track"><div class="ticks" id="ticks"></div><div class="nowline" id="nowline"></div>
        <input type="range" id="slider" min="0" max="0" value="0" step="1" aria-label="Zeit wählen"></div>
    </div>
    <div class="speed"><span style="font-size:11px;color:var(--muted)">Tempo</span>
      <button data-sp="600">langsam</button><button data-sp="350" class="on">normal</button><button data-sp="180">schnell</button></div>
  </div>
  <div class="scalewrap">
    <div class="scalehead"><span>Niederschlagsintensität</span><span>mm/h</span></div>
    <div class="scalebar"></div>
    <div class="scalelabels"><span>0.3</span><span>1</span><span>5</span><span>20</span><span>50+</span></div>
  </div>
</div></div>
<div class="loading" id="loading"><div class="errbox" id="loadtext"><div class="spinner"></div>Daten werden geladen…</div></div>

<script src="places.js?v=1"></script>

<script>
/* Viewer: laedt frames.json (Liste von Radar-/Vorhersagebildern) und animiert sie
   als Overlay ueber einer Leaflet-Karte. Bilder werden per Versions-Token
   (?v=...) cache-frei nachgeladen. */
(function(){
  "use strict";
  // ---- Karte + Hintergrund (hell/dunkel) ----
  var SWISS=[46.83,8.23], Z=8;                 // Standard-Zentrum/Zoom (Schweiz)
  var map=L.map('map',{center:SWISS,zoom:Z,minZoom:6,maxZoom:13,zoomControl:false,
    scrollWheelZoom:'center',doubleClickZoom:'center',touchZoom:'center'}).setView(SWISS,Z);
  L.control.zoom({position:'bottomright'}).addTo(map);
  // ---- Position in der URL (#zoom/lat/lng): teilbar & beim Aufruf direkt anspringen ----
  function parseHash(){var m=/^#(\d+(?:\.\d+)?)\/(-?\d+(?:\.\d+)?)\/(-?\d+(?:\.\d+)?)/.exec(location.hash);
    return m?{z:Math.round(+m[1]),lat:+m[2],lng:+m[3]}:null;}
  function writeHash(){var c=map.getCenter();
    history.replaceState(null,'',location.pathname+'#'+map.getZoom()+'/'+c.lat.toFixed(5)+'/'+c.lng.toFixed(5));}
  var _hp=parseHash();
  if(_hp){ map.setView([_hp.lat,_hp.lng],Math.min(13,Math.max(6,_hp.z))); }
  else if(navigator.geolocation){            // keine Position in der URL -> direkt auf den Standort zoomen
    navigator.geolocation.getCurrentPosition(function(pos){
      map.setView([pos.coords.latitude,pos.coords.longitude],11);
    }, function(){}, {timeout:8000,maximumAge:600000});
  }
  map.on('moveend',writeHash); writeHash();
  // Fadenkreuz-Modell: der angezeigte Wert gilt immer fuer die Kartenmitte (kein Tipp-Pin).
  function refreshCenter(){ selLatLng=map.getCenter(); maybeFetchPlace(selLatLng); updateReadout(); }
  map.on('moveend',refreshCenter); setTimeout(refreshCenter,0);  // beim Laden/Reload einmal aktiv abfragen
  // ---- Ortsname am Fadenkreuz: exakte Rueckwaerts-Geokodierung des Mittelpunkts (OpenStreetMap/Nominatim).
  //      Liefert den Ort/Weiler, der GENAU an diesem Punkt liegt - nicht den naechsten Listenpunkt. In- und Ausland. ----
  var rgeo={key:null,name:null,pending:false,seq:0,cache:{},timer:null};
  var pinned=null;   // vom Label-Klick gesetzt: {name,key} -> genau diesen Namen anzeigen statt Geokodierung
  function keyFor(ll){return ll.lat.toFixed(3)+','+ll.lng.toFixed(3);}        // ~100-m-Raster fuer Cache
  function pickName(a,j){
    var stadt    = a.city || a.town || a.municipality;
    var quartier = a.suburb || a.quarter || a.neighbourhood || a.city_district || a.borough;
    if(stadt && quartier && quartier!==stadt) return stadt+' '+quartier;       // z.B. "Zürich Wiedikon"
    return a.village||a.hamlet||a.isolated_dwelling||a.town||a.suburb||a.quarter // sonst feinste sinnvolle Ebene
         ||a.neighbourhood||a.city_district||a.city||a.municipality||a.locality||a.county||(j&&j.name)||null;
  }
  function maybeFetchPlace(ll){
    var key=keyFor(ll); rgeo.key=key;
    if(pinned){                                                // ein Label wurde angeklickt
      if(pinned.key===key){ rgeo.name=pinned.name; rgeo.pending=false; return; } // -> genau diesen Namen zeigen
      pinned=null;                                             // Karte woanders hin bewegt -> Pin loesen
    }
    if(key in rgeo.cache){rgeo.name=rgeo.cache[key];rgeo.pending=false;return;} // schon bekannt
    rgeo.name=null; rgeo.pending=true; clearTimeout(rgeo.timer);
    var seq=++rgeo.seq;
    rgeo.timer=setTimeout(function(){                                          // erst nach kurzer Ruhe abfragen (Nominatim-Policy)
      var url='https://nominatim.openstreetmap.org/reverse?format=jsonv2&zoom=14&accept-language=de&lat='+ll.lat+'&lon='+ll.lng;
      fetch(url,{headers:{'Accept':'application/json'}}).then(function(r){return r.json();}).then(function(j){
        if(seq!==rgeo.seq)return;                                              // Karte wurde weiterbewegt -> verwerfen
        var nm=pickName((j&&j.address)||{},j);
        rgeo.cache[key]=nm; if(rgeo.key===key){rgeo.name=nm;rgeo.pending=false;updateReadout();}
      }).catch(function(){if(seq===rgeo.seq){rgeo.pending=false;updateReadout();}});
    },650);
  }
  map.attributionControl.setPrefix(false);
  var LIGHT="https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png";
  var DARK ="https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png";
  var LBL_L="https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png";
  var LBL_D="https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png";
  var base=L.tileLayer(LIGHT,{attribution:'© OpenStreetMap, © CARTO · Daten: MeteoSchweiz, DWD, Météo-France',maxZoom:19}).addTo(map);
  // Label-Ebene, exakt entlang der Schweizer Grenze ausgespart: im Ausland Ortsnamen aus der
  // Basiskarte, in der Schweiz unsere eigenen Labels (keine Doppelung, kein grobes Rechteck mehr).
  map.createPane('lbl'); map.getPane('lbl').style.zIndex=450; map.getPane('lbl').style.pointerEvents='none';
  var ClippedLabels=L.TileLayer.extend({
    createTile:function(coords,done){
      var tile=document.createElement('canvas'), sz=this.getTileSize();
      tile.width=sz.x; tile.height=sz.y;
      var ctx=tile.getContext('2d'), mp=this._map, img=new Image();
      img.onload=function(){
        try{
          ctx.drawImage(img,0,0,sz.x,sz.y);
          var B=window.CH_BORDER;
          if(B&&B.length){                                    // Schweiz aus den Labels ausstanzen
            ctx.globalCompositeOperation='destination-out';
            ctx.beginPath();
            var ox=coords.x*sz.x, oy=coords.y*sz.y;
            for(var k=0;k<B.length;k++){var p=mp.project([B[k][0],B[k][1]],coords.z);
              k?ctx.lineTo(p.x-ox,p.y-oy):ctx.moveTo(p.x-ox,p.y-oy);}
            ctx.closePath(); ctx.fill();
            ctx.globalCompositeOperation='source-over';
          }
        }catch(e){}
        done(null,tile);
      };
      img.onerror=function(e){done(e,tile);};
      img.src=this.getTileUrl(coords);
      return tile;
    }
  });
  var labels=new ClippedLabels(LBL_L,{maxZoom:19,pane:'lbl',detectRetina:false}).addTo(map);
  var dark=false;
  document.getElementById('darkBtn').onclick=function(){dark=!dark;
    base.setUrl(dark?DARK:LIGHT); labels.setUrl(dark?LBL_D:LBL_L); this.classList.toggle('on',dark);
    document.body.style.background=dark?'#10140c':'#dfe5d8';document.getElementById('map').style.background=dark?'#10140c':'#dfe5d8';};
  // ---- Hinweis-Balken (Toast) ----
  function toast(html, ms){
    var t=document.getElementById('toast'); if(!t)return;
    t.innerHTML='<span class="tx" id="toastx">✕</span>'+html;
    t.style.display='block';
    document.getElementById('toastx').onclick=function(){t.style.display='none';};
    clearTimeout(t._h); if(ms)t._h=setTimeout(function(){t.style.display='none';},ms);
  }
  var GEO_BLOCKED='<b>Standortfreigabe ist blockiert.</b><br>So erlaubst du sie wieder: in der Adressleiste auf das '
    +'Schloss- bzw. Info-Symbol tippen → Standort/Berechtigungen → „Erlauben", dann nochmal auf ⌖ tippen.';
  // ---- Standort-Knopf: per Browser-Geolocation auf den eigenen Standort zentrieren ----
  document.getElementById('homeBtn').onclick=function(){
    var btn=this; btn.classList.add('on');
    if(!navigator.geolocation){btn.classList.remove('on');
      toast('Dein Browser unterstützt keine Standortbestimmung.',6000);return;}
    navigator.geolocation.getCurrentPosition(function(pos){
      var ll=L.latLng(pos.coords.latitude,pos.coords.longitude);
      map.setView(ll, Math.max(map.getZoom(),9)); // zentrieren, Zoom nie verkleinern (nur ggf. hinein)
      document.getElementById('toast').style.display='none';
      btn.classList.remove('on');
    },function(err){                            // Fehler: je nach Ursache passender Hinweis
      btn.classList.remove('on');
      if(err && err.code===1) toast(GEO_BLOCKED,14000);                 // PERMISSION_DENIED
      else toast('Standort konnte nicht ermittelt werden. Bitte erneut versuchen.',6000);
    },
    {enableHighAccuracy:true,timeout:8000,maximumAge:60000});
  };
  // ---- Refresh-Knopf: neueste Daten holen, ohne URL/Position zu aendern ----
  document.getElementById('refreshBtn').onclick=function(){
    var btn=this; btn.classList.add('on');
    // frames.json wird ohnehin per cache:'no-store' frisch geholt, Bilder ueber ?v=Build-Token.
    // Daher reicht ein normaler Reload; URL inkl. #Position bleibt erhalten.
    location.reload();
  };

  // ---- Ortsmarkierungen: [Name, Breite, Laenge, ab welcher Zoomstufe sichtbar] ----
  // Grosse Staedte ab Zoom 6, mittlere ab 7/8, kleine Orte erst beim Hineinzoomen (9).
  var CITIES=[

    }
    document.getElementById('nowline').style.left=((nowIdx+1)/frames.length*100)+'%';
    slider.max=frames.length-1;
  }
  // Manifest anwenden: Overlays neu aufbauen, Zeitleiste setzen, Start waehlen
  function apply(data){
    if(data.frames.map(function(f){return f.time}).join()===refId) return;  // unveraendert -> nichts tun
    refId=data.frames.map(function(f){return f.time}).join();
    clearOverlays();
    bounds=data.bounds;
    bS=bounds[0][0];bW=bounds[0][1];bN=bounds[1][0];bE=bounds[1][1];        // Kartengrenzen merken
    // Bild-URL mit Versions-Token (?v=...) -> neuer Build = neue URL = frisches Bild (kein Cache)
    frames=data.frames.map(function(f){var o=Object.assign({},f);o._url=(data.tile_base||'')+f.file+'?v='+(data.v||'');return o;});
    frames.forEach(function(f){imgFor(f._url);});                          // alle Bilder sofort vorladen (Mobile: keine Luecken)
    nowMs = data.now? new Date(data.now).getTime() : new Date(frames[frames.length-1].time).getTime();
    nowIdx=0;for(var i=0;i<frames.length;i++){if(frames[i].kind==='radar')nowIdx=i;}   // letztes Radarbild = "jetzt"
    // Schleife startet 30 Min vor "jetzt": Frame mit der geringsten Zeitdifferenz dazu
    var startMs=nowMs-30*60*1000,best=1e15;loopStart=0;
    frames.forEach(function(f,i){var d=Math.abs(new Date(f.time).getTime()-startMs);if(d<best){best=d;loopStart=i;}});
    buildTimeline();
    buildMs = data.v ? data.v * 1000 : nowMs;          // Zeitpunkt des letzten Builds
    frameCount = frames.length;
    updateStamp();
    document.getElementById('loading').style.display='none';
    selLatLng=map.getCenter();                 // Chip zeigt von Anfang an die Kartenmitte
    show(loopStart); if(!playing) play();
  }
  // Frische-Anzeige: "Stand HH:MM · vor N Min" – beides bezieht sich auf DIESELBE Zeit
  // (das juengste Radarbild), damit HH:MM + N Min = aktuelle Uhr ergibt. Punkt gruen/gelb/rot.
  var buildMs = 0, frameCount = 0;
  function updateStamp(){
    var el = document.getElementById('updated'); if(!el) return;
    var dot = document.querySelector('.status .live');
    if(!nowMs){el.textContent='lädt…';return;}
    var ageMin = Math.max(0, Math.round((Date.now() - nowMs) / 60000));
    var age = ageMin < 1 ? 'gerade aktualisiert' : ('vor ' + ageMin + ' Min');
    el.textContent = "Stand " + hm(new Date(nowMs)) + " · " + age;
    if(dot) dot.style.background = ageMin > 45 ? '#d64545' : (ageMin > 25 ? '#e0a32e' : '');
  }
  function fail(msg){if(frames.length)return;document.getElementById('loadtext').innerHTML="⚠️ "+msg;}
  // Manifest laden (immer cache-frei: ?Zeitstempel + no-store)
  function load(){
    fetch('frames.json?'+Date.now(),{cache:'no-store'})
      .then(function(r){return r.ok?r.json():r.json().then(function(j){throw new Error(j.error||('HTTP '+r.status))});})
      .then(function(d){if(d.frames&&d.frames.length)apply(d);else fail('Keine Daten verfügbar.');})
      .catch(function(e){fail((e&&e.message)||'Daten konnten nicht geladen werden.');});
  }
  load(); setInterval(load,5*60*1000); setInterval(updateStamp,30*1000);

  document.addEventListener('keydown',function(e){
    var t=e.target;                                            // beim Tippen in Felder nicht eingreifen
    if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable))return;
    if(e.code==='Space'){e.preventDefault();playing?pause():play();}
    else if(e.code==='ArrowRight'){pause();show(idx+1);}
    else if(e.code==='ArrowLeft'){pause();show(idx-1);}});
  // ---- Niederschlag am angetippten Punkt (aus der Pixelfarbe der jeweiligen Karte) ----
  var SCALE_JS=[[0.05,[165,215,255]],[0.3,[110,175,248]],[1,[45,110,225]],[2,[40,180,170]],
    [5,[95,200,80]],[10,[230,215,70]],[20,[240,150,55]],[50,[225,55,50]],[1e9,[170,25,110]]];
  function rangeText(k){var lo=k===0?0:SCALE_JS[k-1][0],hi=SCALE_JS[k][0];
    if(k===0)return '< '+(''+SCALE_JS[0][0]).replace('.',',')+' mm/h';if(hi>=1e9)return '> '+lo+' mm/h';
    return (''+lo).replace('.',',')+'–'+(''+hi).replace('.',',')+' mm/h';}
  var _cv=document.createElement('canvas'),_ctx=_cv.getContext('2d',{willReadFrequently:true}),_imgs={};
  function imgFor(url){if(_imgs[url])return _imgs[url];var im=new Image();im.onload=function(){updateReadout();};im.src=url;_imgs[url]=im;return im;}
  function sampleAt(i,ll){
    if(!frames[i])return undefined;
    if(ll.lng<bW||ll.lng>bE||ll.lat<bS||ll.lat>bN)return undefined; // ausserhalb der Karte
    var im=imgFor(frames[i]._url);if(!im.complete||!im.naturalWidth)return undefined;
    var w=im.naturalWidth,h=im.naturalHeight;
    if(_cv.width!==w){_cv.width=w;_cv.height=h;}
    try{_ctx.clearRect(0,0,w,h);_ctx.drawImage(im,0,0);
      var x=Math.min(w-1,Math.max(0,Math.round((ll.lng-bW)/(bE-bW)*w)));
      var y=Math.min(h-1,Math.max(0,Math.round((bN-ll.lat)/(bN-bS)*h)));
      var d=_ctx.getImageData(x,y,1,1).data;
      if(d[3]<8)return null; // transparent = kein Niederschlag
      var best=0,bd=1e9;for(var k=0;k<SCALE_JS.length;k++){var c=SCALE_JS[k],
        e=(c[1][0]-d[0])*(c[1][0]-d[0])+(c[1][1]-d[1])*(c[1][1]-d[1])+(c[1][2]-d[2])*(c[1][2]-d[2]);
        if(e<bd){bd=e;best=k;}}return best;
    }catch(err){return -1;} // Pixel nicht lesbar
  }
  // ---- Koordinaten: in/nahe der Schweiz LV95 (CH95), sonst WGS84 ----
  function toLV95(lat,lng){
    var p=(lat*3600-169028.66)/10000, l=(lng*3600-26782.5)/10000;
    var E=2600072.37 + 211455.93*l - 10938.51*l*p - 0.36*l*p*p - 44.54*l*l*l;
    var N=1200147.07 + 308807.95*p + 3745.25*l*l + 76.63*p*p - 194.56*l*l*p + 119.79*p*p*p;
    return [E,N];
  }
  function grp(n){return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'\u2019');} // 1234567 -> 1'234'567
  function coordText(ll){
    if(ll.lat>=45.5&&ll.lat<=48.0&&ll.lng>=5.5&&ll.lng<=11.0){      // in/nahe der Schweiz -> LV95 (CH95)
      var c=toLV95(ll.lat,ll.lng); return 'E '+grp(c[0])+'   N '+grp(c[1]);
    }
    return ll.lat.toFixed(4)+'°, '+ll.lng.toFixed(4)+'°';            // ausserhalb -> WGS84
  }
  function updateReadout(){
    var dry=document.getElementById('drybadge'),chip=document.getElementById('pointchip');
    // Trocken-Hinweis: aktuelles Bild ohne Niederschlag
    var fr=frames[idx];
    if(fr&&(+fr.max_mmh)===0){dry.style.display='block';
      dry.textContent=fr.kind==='forecast'?'kein Niederschlag erwartet':'kein Niederschlag';}
    else dry.style.display='none';
    // Punkt-Anzeige
    if(!selLatLng){chip.style.display='none';return;}
    chip.style.display='flex';
    var loc='';                                              // Ortsname = exakte Rueckwaerts-Geokodierung des Punkts
    if(rgeo.key===keyFor(selLatLng)){ loc = rgeo.name || (rgeo.pending?'…':''); }
    document.getElementById('pcloc').textContent = loc ? loc+' ·' : '';
    document.getElementById('pccoord').textContent = coordText(selLatLng);   // CH95 bzw. WGS84
    var k=sampleAt(idx,selLatLng),sw=document.getElementById('pcsw'),val=document.getElementById('pcval');
    if(k===undefined){sw.style.background='transparent';sw.style.borderColor='transparent';val.textContent='—';}
    else if(k===-1){sw.style.background='transparent';sw.style.borderColor='transparent';val.textContent='—';}
    else if(k===null){sw.style.background='transparent';sw.style.borderColor='rgba(0,0,0,.15)';val.textContent='kein Niederschlag';}
    else{var c=SCALE_JS[k][1];sw.style.background='rgb('+c[0]+','+c[1]+','+c[2]+')';sw.style.borderColor='rgba(0,0,0,.15)';val.textContent=rangeText(k);}
  }
  map.on('click',function(e){ map.panTo(e.latlng); });          // auf den getippten Punkt zentrieren; Mitte = Fadenkreuz

})();
</script>
